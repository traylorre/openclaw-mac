; Vale prose linter configuration for openclaw-mac
; Checks terminology, standard references, and documentation consistency
; Run: make vale

StylesPath = styles
MinAlertLevel = warning

; Ignore non-documentation directories
[*]
BasedOnStyles = OpenClaw

; Only lint documentation markdown files
[docs/*.md]
BasedOnStyles = OpenClaw

[GETTING-STARTED.md]
BasedOnStyles = OpenClaw

[README.md]
BasedOnStyles = OpenClaw

[ROADMAP.md]
BasedOnStyles = OpenClaw
