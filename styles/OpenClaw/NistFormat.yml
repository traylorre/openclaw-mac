# Flag NIST SP 800-53 family IDs missing the required hyphen.
# Correct: SC-28, CM-5, SI-7
# Wrong: SC28, CM5, SI7
#
# This catches typos where the hyphen is omitted, which could confuse
# automated tools or readers looking up the control.
extends: existence
message: "NIST family ID '%s' appears to be missing a hyphen (e.g., 'SC28' should be 'SC-28')."
level: warning
scope: sentence
nonword: true
tokens:
  - '\b(?:AC|AT|AU|CA|CM|CP|IA|IR|MA|MP|PE|PL|PM|PS|PT|RA|SA|SC|SI|SR)\d{1,2}\b'
