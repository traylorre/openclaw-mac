# OpenClaw Mac — Hardened n8n Docker Compose
# See docs/HARDENING.md §4.3 for security annotations
#
# Usage:
#   1. Create secrets: mkdir -p secrets && chmod 700 secrets
#   2. Generate key: openssl rand -hex 32 > secrets/n8n_encryption_key.txt
#   3. Set permissions: chmod 600 secrets/n8n_encryption_key.txt
#   4. Deploy: docker compose up -d
secrets:
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key.txt  # chmod 600 (FR-058, R-012)

services:
  n8n:
    # Pin to specific version (FR-002). To update:
    #   1. Change tag below
    #   2. docker compose pull n8n
    #   3. docker compose up -d --no-deps n8n
    #   4. Re-run hardening audit to verify
    # M3: Custom image with Playwright for LinkedIn feed discovery
    # Original: n8nio/n8n:2.13.0
    image: openclaw-n8n:latest
    container_name: openclaw-n8n

    # Load OPENCLAW_WEBHOOK_SECRET from repo-root .env (hmac-keygen.sh writes there)
    env_file:
      - ../../.env

    # Non-root user (FR-041) — UID 1000 matches Colima default
    user: "1000:1000"

    # Localhost-only port binding (FR-058)
    # DANGEROUS if changed to "5678:5678" — exposes to entire network
    ports:
      - "127.0.0.1:5678:5678"

    # Read-only root filesystem (FR-041)
    # M3: Playwright requires writable dirs for browser profile and cache
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /home/node/.cache:uid=1000,gid=1000
      - /home/node/.local:uid=1000,gid=1000

    # Persistent data only — no host directory mounts (FR-058)
    # NOTE: Never mount /var/run/docker.sock (SC-017)
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-entrypoint.sh:/entrypoint.sh:ro
      - ../../n8n/workflows:/tmp/workflows:ro
      # M3: Playwright browser session persistence (storageState JSON)
      - browser_profile:/data/browser-profile

    # Docker secrets — NOT environment variables (FR-058, FR-090)
    secrets:
      - n8n_encryption_key

    # Non-sensitive environment variables only (FR-058)
    # Sensitive values loaded by entrypoint script from /run/secrets/
    # See docs/HARDENING.md §5.3 for full reference
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_LOG_LEVEL=info
      # M3: Allow crypto module in Code nodes for HMAC verification
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      # Security hardening (§5.3)
      # M3: Changed from true to false — HMAC verification Code node (hmac-verify.json)
      # reads OPENCLAW_WEBHOOK_SECRET from env. This is a security trade-off:
      # Pro: Enables HMAC webhook auth (identity + integrity + replay protection)
      # Con: Code nodes can now read ALL env vars (including N8N_ENCRYPTION_KEY)
      # Mitigation: n8n is localhost-only, workflows are version-controlled,
      #   only operator can create/modify workflows via n8n UI
      # Original: N8N_BLOCK_ENV_ACCESS_IN_NODE=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n  # Restrict Code node filesystem access
      # M3: API enabled — required for activity-query (T068) and rate-limit-tracker (T063)
      # Original: N8N_PUBLIC_API_DISABLED=true
      - N8N_PUBLIC_API_DISABLED=false
      - N8N_MFA_ENABLED=true                      # Enable TOTP 2FA support
      # Dangerous node exclusion (§5.6)
      - NODES_EXCLUDE=["n8n-nodes-base.executeCommand","n8n-nodes-base.ssh","n8n-nodes-base.localFileTrigger"]
      # Telemetry/information leakage (§5.3)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      # Execution data retention
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      # M3: 120-day retention for activity log until M4 (Qdrant+Mem0) replaces
      - EXECUTIONS_DATA_MAX_AGE=2880
      # M3: Community node n8n-nodes-playwright is symlinked into ~/.n8n/nodes/
      # by the entrypoint script on first boot (see n8n-entrypoint.sh)
      # M3: OPENCLAW_WEBHOOK_SECRET loaded via env_file (repo-root .env)
      # Do NOT duplicate here — environment: overrides env_file: and compose
      # interpolation would resolve to empty if the host shell lacks the var.

    # Security hardening (FR-041)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Core dump prevention (FR-068)
    ulimits:
      core:
        soft: 0
        hard: 0

    # Resource limits — adjust for your hardware (FR-058)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

    # Restart on crash, not after intentional stop (FR-058)
    restart: unless-stopped

    # Entrypoint wrapper for Docker secrets (R-001)
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

    # DNS — use encrypted DNS resolver (FR-029)
    dns:
      - 9.9.9.9
      - 149.112.112.112

    # Docker log rotation — limit credential exposure window (FR-090)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:       # Persists workflows, credentials, execution logs
  browser_profile: # M3: Playwright LinkedIn session (storageState JSON)
