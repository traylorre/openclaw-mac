name: macOS Integration Tests

on:
  push:
    branches: [main]
    paths: ['scripts/**']
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 6 AM UTC

jobs:
  macos-integration:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: brew install bats-core

      - name: Run unit tests (verify cross-platform)
        run: bats tests/bats/unit/*.bats
        env:
          TERM: xterm

      - name: Run integration tests
        run: bats tests/bats/integration/*.bats
        env:
          TERM: xterm
